<!DOCTYPE html>
<html lang="PL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" sizes="32x32" href="logo.png">
    <title>Web Desing Skalmierzyce</title>
    <link rel="stylesheet" href="styl.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <div class="logo">
        <img src="logo.png" alt="logo"><span>Web Design Skalmierzyce</span>
    </div>

    <nav>
        <a class="naglowekprzycisk" href="zamowienia.html">ZAMÓW STRONĘ</a>
        <a class="naglowekprzycisk" href="kontakt.html">KONTAKT</a>
        <a class="naglowekprzycisk" href="portfolio.html">PORTFOLIO</a>
        <a class="naglowekprzycisk" href="onas.html">O NAS</a>
    </nav>
</header>
<main id="content">
<section id="mainkontakt">
    <div class="kontakt-box">
        <h1>Kontakt</h1>

        <p>📧 Mail: skalmierzyce@webdesign.pl</p>
        <p>📞 Telefon: +48 123 456 789</p>

        <h2>Napisz do nas</h2>
<form action="https://formspree.io/f/xwvjglvb" method="POST" id="contactForm">

    <input type="text" name="name" placeholder="Imię i nazwisko" required>

    <input type="email" name="email" placeholder="Adres e-mail" required>

    <input type="tel" name="phone" placeholder="Numer telefonu (opcjonalne)">

    <textarea name="message" placeholder="Twoja wiadomość" rows="6" required></textarea>

    <button type="submit">Wyślij wiadomość</button>
</form> 

    </div>
</section>
</main>
<script>
document.addEventListener("DOMContentLoaded", () => {

    const content = document.getElementById("content");

    if (!content) return;

    // wejście strony
    requestAnimationFrame(() => {
        content.classList.add("page-in");
    });

    // przejścia między stronami
    document.addEventListener("click", (e) => {

        const link = e.target.closest("a");

        if (!link) return;

        // ignoruj external i kotwice
        if (link.target === "_blank" || link.href.includes("#")) return;

        e.preventDefault();

        // start animacji OUT
        content.classList.remove("page-in");
        content.classList.add("page-out");

        // po animacji zmiana strony
        setTimeout(() => {
            window.location.href = link.href;
        }, 450);
    });

});
</script>
</body>
</html>
